<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter+Tight:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f93706",
                        "background-light": "#ffffff",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "sans": ["Inter Tight", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .grid-pattern {
            background-image: radial-gradient(rgba(249, 55, 6, 0.15) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background-dark font-display antialiased overflow-x-hidden">
    <div class="flex min-h-screen w-full flex-col lg:flex-row">
        <!-- Left Side: Pitch Black Military Aesthetic (Visible on desktop, hidden or modified on mobile) -->
        <div
            class="hidden lg:flex w-1/3 bg-background-dark relative border-r border-primary/20 overflow-hidden flex-col justify-between p-12">
            <div class="grid-pattern absolute inset-0 opacity-50"></div>
            <!-- <div class="relative z-10">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-[2px] bg-primary"></div>
                    <p class="font-mono text-[10px] uppercase tracking-[0.3em] text-primary" style="">System Auth v4.0.1
                    </p>
                </div>
            </div> -->
            <div class="relative z-10 py-20">
                <h1 class="vertical-text text-8xl font-bold tracking-tighter text-slate-100 uppercase leading-none opacity-90 select-none"
                    style="">
                    Lead<span class="text-primary" style="">Mind</span>
                </h1>
            </div>
            <div class="relative z-10 flex flex-col gap-4">
                <p class="font-mono text-[12px] text-slate-500 uppercase leading-relaxed max-w-[200px]" style="">
                    Sales Multi-Agent System For Lead Management.
                </p>
                <div class="h-1 w-full bg-primary"></div>
            </div>
        </div>
        <!-- Right Side: Clean White Signup Form -->
        <div class="flex-1 bg-background-light dark:bg-background-light min-h-screen flex flex-col">
            <!-- Mobile Navigation Header -->
            <div class="flex items-center justify-between p-6 border-b border-slate-200">
                <div class="flex items-center gap-4">
                    <span class="material-symbols-outlined text-slate-900" style="">arrow_back</span>
                    <h2 class="text-slate-900 text-xl font-bold uppercase tracking-tight" style="">Signup Stage 1</h2>
                </div>
                <div class="flex flex-col items-end">
                    <span class="font-mono text-[10px] text-slate-500 uppercase tracking-widest font-bold"
                        style="">Protocol</span>
                    <span class="font-mono text-[12px] text-primary font-bold" style="">1 of 3</span>
                </div>
            </div>
            <!-- Progress Bar -->
            <div class="w-full h-1 bg-slate-100">
                <div class="h-full bg-primary" style="width: 33.33%;"></div>
            </div>
            <div class="flex-1 flex flex-col p-6 lg:p-20 max-w-2xl mx-auto w-full">
                <div class="mb-10">
                    <h3 class="text-4xl font-bold text-slate-900 uppercase tracking-tight mb-2" style="">Company Details
                    </h3>
                    <p class="font-sans text-slate-500 text-lg" style="">Initialize your organizational profile for
                        system integration.</p>
                </div>
                <form class="space-y-8">
                    <!-- Company Name -->
                    <div class="relative group">
                        <label
                            class="absolute -top-3 left-4 bg-white px-2 font-mono text-[11px] font-bold text-slate-900 uppercase tracking-widest z-10 transition-all group-focus-within:text-primary"
                            style="">
                            Company Name
                        </label>
                        <input
                            class="w-full h-16 border-2 border-slate-900 rounded-none px-6 font-mono text-sm tracking-tight focus:ring-0 focus:border-primary placeholder:text-slate-300 text-slate-900 bg-transparent uppercase"
                            placeholder="ENTER LEGAL ENTITY NAME" type="text">
                    </div>
                    <!-- Company Website URL -->
                    <div class="relative group">
                        <label
                            class="absolute -top-3 left-4 bg-white px-2 font-mono text-[11px] font-bold text-slate-900 uppercase tracking-widest z-10 transition-all group-focus-within:text-primary"
                            style="">
                            Company Website URL
                        </label>
                        <input
                            class="w-full h-16 border-2 border-slate-900 rounded-none px-6 font-mono text-sm tracking-tight focus:ring-0 focus:border-primary placeholder:text-slate-300 text-slate-900 bg-transparent uppercase"
                            placeholder="HTTPS://ORGANIZATION.DOMAIN" type="url">
                    </div>
                    <!-- Country Dropdown -->
                    <div class="relative group">
                        <label
                            class="absolute -top-3 left-4 bg-white px-2 font-mono text-[11px] font-bold text-slate-900 uppercase tracking-widest z-10 transition-all group-focus-within:text-primary"
                            style="">
                            Operating Region / Country
                        </label>
                        <div class="relative">
                            <select
                                class="w-full h-16 border-2 border-slate-900 rounded-none px-6 font-mono text-sm tracking-tight focus:ring-0 focus:border-primary text-slate-900 bg-transparent appearance-none uppercase cursor-pointer">
                                <option disabled="" selected="" value="">SELECT REGION</option>
                                <option value="us">UNITED STATES</option>
                                <option value="uk">UNITED KINGDOM</option>
                                <option value="eu">EUROPEAN UNION</option>
                                <option value="as">ASIA PACIFIC</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
                                <span class="material-symbols-outlined text-slate-900" style="">expand_more</span>
                            </div>
                        </div>
                    </div>
                    <!-- Additional Context -->
                    <div class="bg-slate-50 border-l-4 border-primary p-4 flex gap-4">
                        <span class="material-symbols-outlined text-primary" style="">info</span>
                        <p class="font-mono text-[10px] text-slate-600 leading-tight uppercase" style=""><br></p>
                    </div>
                    <!-- Actions -->
                    <div class="pt-8 flex flex-col gap-4">
                        <button
                            class="w-full h-16 bg-primary text-white font-mono font-bold text-lg uppercase tracking-[0.2em] flex items-center justify-center gap-3 transition-transform active:scale-[0.98] border-2 border-primary"
                            type="submit" style="">
                            Continue to step 2
                            <span class="material-symbols-outlined" style="">arrow_forward</span>
                        </button>
                        <div class="flex justify-between items-center px-2">
                            <p class="font-mono text-[10px] text-slate-400 uppercase" style="">Status: Session Active
                            </p>
                            <p class="font-mono text-[10px] text-slate-400 uppercase" style=""><br></p>
                        </div>
                    </div>
                </form>
            </div>
            <!-- Footer for visual balance -->
            <div class="mt-auto p-6 border-t border-slate-100 flex justify-between items-center">
                <img alt="Security Partner Logo" class="h-6 opacity-30 grayscale"
                    data-alt="Security certification logo in black and white"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAV1MCjGHqGVuhCiWfdShFzfHAJHmkF0BpWbt7oxCqJB7vM3Q-uRPbN-zfzkYcuYMIJAkEPUERMclwcQxSG4RI43odfoOPDQNbGxPSb7Wyww5A0EZL7j_o12FY3Fkg5JdmACbf2mqSwDh3li-eSVKf0tixugzPxHxu_V1fdTuK8B_z1xWSJDznFJDRgjkVw0s-HpilpAz2cQsFzlxn1QYFKzg09vJWxCSLHiYwggmeMBpFt0I2LtTfThgNnnTWElgreDqPU0ioUjNQt"
                    style="">
                <span class="font-mono text-[10px] text-slate-400 uppercase tracking-widest" style=""><br></span>
            </div>
        </div>
    </div>
</body>

</html>
