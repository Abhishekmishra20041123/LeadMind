<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Step 3 Security</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f93706",
                        "background-light": "#ffffff",
                        "background-dark": "#0a0a0a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .grid-pattern {
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased overflow-x-hidden">
<div class="flex flex-col md:flex-row min-h-screen">
<!-- Left Side: Strategic Grid (Split-screen) -->
<div class="hidden md:flex w-1/3 bg-background-dark border-r border-white/10 relative overflow-hidden items-center justify-center p-12 grid-pattern">
<div class="absolute top-12 left-12 flex flex-col gap-2">
<span class="font-mono text-[10px] text-primary tracking-[0.2em] font-bold">ACCOUNT SETUP</span>
<div class="w-12 h-[1px] bg-primary"></div>
</div>
<h1 class="vertical-text text-white text-7xl font-bold tracking-tighter opacity-20 select-none">
                LEADMIND
            </h1>
<div class="absolute bottom-12 left-12">
<div class="flex gap-1">
<div class="w-1 h-1 bg-primary"></div>
<div class="w-1 h-1 bg-white/20"></div>
<div class="w-1 h-1 bg-white/20"></div>
</div>
</div>
</div>
<!-- Right Side: Signup Form -->
<div class="flex-1 bg-white dark:bg-white min-h-screen flex flex-col">
<!-- Mobile Header (Visible on iOS form factor) -->
<div class="flex items-center justify-between p-6 border-b border-black md:hidden">
<span class="material-symbols-outlined text-black cursor-pointer">arrow_back</span>
<span class="font-mono text-xs font-bold text-black tracking-widest uppercase">Step 3 of 3</span>
<span class="material-symbols-outlined text-black opacity-0">close</span>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col justify-center max-w-md mx-auto w-full px-6 py-12">
<!-- Breadcrumb/Step Indicator for Desktop -->
<div class="hidden md:flex items-center gap-4 mb-12">
<span class="font-mono text-xs font-bold text-black bg-black/5 px-2 py-1">STEP 03</span>
<div class="flex-1 h-[1px] bg-black/10"></div>
<span class="font-mono text-xs text-black/40">SECURITY CONFIG</span>
</div>
<div class="mb-10">
<h2 class="text-black text-4xl font-bold leading-none tracking-tight mb-2">Step 3</h2>
<p class="text-black/60 text-lg font-medium">Security settings configuration</p>
</div>
<form class="space-y-8">
<!-- Password Field -->
<div class="relative group">
<label class="absolute -top-3 left-4 bg-white px-2 font-mono text-[10px] uppercase font-bold text-black z-10">
                            Access Password
                        </label>
<div class="relative">
<input class="w-full border-black border-2 bg-transparent px-4 py-5 font-mono text-black focus:ring-0 focus:border-primary placeholder:text-black/10 rounded-none transition-colors" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-black/40 cursor-pointer hover:text-black">visibility</span>
</div>
</div>
<!-- Confirm Password Field -->
<div class="relative group">
<label class="absolute -top-3 left-4 bg-white px-2 font-mono text-[10px] uppercase font-bold text-black z-10">
                            Confirm Identity Key
                        </label>
<div class="relative">
<input class="w-full border-black border-2 bg-transparent px-4 py-5 font-mono text-black focus:ring-0 focus:border-primary placeholder:text-black/10 rounded-none transition-colors" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-black/40 cursor-pointer hover:text-black">lock</span>
</div>
</div>
<!-- Security Requirements -->
<div class="grid grid-cols-2 gap-2">
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 bg-primary"></div>
<span class="font-mono text-[9px] uppercase text-black/60">Min 12 Chars</span>
</div>
<div class="flex items-center gap-2">
<div class="w-1.5 h-1.5 bg-black/20"></div>
<span class="font-mono text-[9px] uppercase text-black/60">Special Symbol</span>
</div>
</div>
<!-- Actions -->
<div class="pt-6 flex flex-col gap-4">
<button class="w-full bg-primary text-white font-bold py-5 px-8 uppercase tracking-widest text-sm hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-between" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined">terminal</span>
</button>
<button class="w-full border border-black/10 text-black/40 font-mono text-xs uppercase py-4 hover:bg-black/5 transition-colors" type="button">
                            Return to Previous Stage
                        </button>
</div>
</form>
</div>
<!-- Bottom Navigation Bar (Mobile) -->
<div class="md:hidden border-t border-black/5 bg-white p-4">
<div class="flex justify-between items-center px-4">
<a class="text-primary flex flex-col items-center gap-1" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">shield</span>
<span class="font-mono text-[8px] font-bold">SECURE</span>
</a>
<a class="text-black/20 flex flex-col items-center gap-1" href="#">
<span class="material-symbols-outlined">dataset</span>
<span class="font-mono text-[8px] font-bold">MIND</span>
</a>
<a class="text-black/20 flex flex-col items-center gap-1" href="#">
<span class="material-symbols-outlined">account_circle</span>
<span class="font-mono text-[8px] font-bold">USER</span>
</a>
</div>
</div>
</div>
</div>
</body></html>
